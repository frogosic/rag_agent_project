queries:
  # Technical queries

  - id: tech-001
    query: 'How do I refresh a JWT token?'
    expected_target: auth.endpoints
    expected_signals:
      - /auth/refresh
      - refresh_token
    anti_signals: []
    min_signal_recall: 0.5
    require_semantic_hit: true
    notes: 'Direct endpoint lookup. Either signal alone is sufficient evidence.'

  - id: tech-002
    query: "What's the login endpoint request format?"
    expected_target: auth.endpoints
    expected_signals:
      - /auth/login
      - email
      - password
    anti_signals: []
    min_signal_recall: 0.67
    require_semantic_hit: true
    notes: 'Tests that JSON-bearing code block content is retrievable post fix-1.'

  - id: tech-003
    query: 'What does a 429 error mean in the auth service?'
    expected_target: auth.errors
    expected_signals:
      - '429'
      - rate
    anti_signals: []
    min_signal_recall: 0.5
    require_semantic_hit: true
    notes: "Error code lookup. BM25 should hit '429' exactly. Validates fix-1 (numbers preserved)."

  - id: tech-004
    query: 'How long do access tokens last?'
    expected_target: auth.tokens
    expected_signals:
      - access tokens
      - 1 hour
    anti_signals: []
    min_signal_recall: 0.5
    require_semantic_hit: true
    notes: "Paraphrase test — 'last' vs doc's 'expire after'. Stresses dense retrieval."

  - id: tech-005
    query: 'What environment variables does authentication need?'
    expected_target: auth.config
    expected_signals:
      - AUTH_SECRET_KEY
      - AUTH_TOKEN_EXPIRY
    anti_signals: []
    min_signal_recall: 0.5
    require_semantic_hit: true
    notes: 'Config lookup. Validates fix-1 (env var names preserved across markdown stripping).'

  - id: tech-006
    query: 'What is the authentication service?'
    expected_target: auth.overview
    expected_signals:
      - authentication service
      - JWT
    anti_signals: []
    min_signal_recall: 0.5
    require_semantic_hit: true
    notes: "High-level question. Validates that the deleted title-only chunk hasn't leaked back."

  - id: tech-007
    query: 'How do I log out a user?'
    expected_target: auth.endpoints
    expected_signals:
      - /auth/logout
    anti_signals: []
    min_signal_recall: 1.0
    require_semantic_hit: true
    notes: 'Validates that all three endpoints stay co-located in one chunk post fix-2.'

