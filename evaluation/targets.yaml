targets:
  # ============================================================
  # TECHNICAL — auth_overview.md
  # Conceptual content: methods, when-to-use, conceptual failure modes.
  # ============================================================
  technical.auth.overview.methods:
    doc: auth_overview.md
    heading_keywords:
      - supported authentication methods
    must_contain:
      - bearer tokens
      - api keys
      - oauth

  technical.auth.overview.selection:
    doc: auth_overview.md
    heading_keywords:
      - when to use which method
    must_contain:
      - first-party
      - backend service

  technical.auth.overview.failure_concepts:
    doc: auth_overview.md
    heading_keywords:
      - failure modes
    must_contain:
      - re-authenticate
      - rate limiting

  # ============================================================
  # TECHNICAL — auth_api_reference.md
  # Operational content: endpoints, shapes, error codes.
  # ============================================================
  technical.auth.endpoint.login:
    doc: auth_api_reference.md
    heading_keywords:
      - /auth/login
    must_contain:
      - access_token
      - refresh_token
      - expires_in

  technical.auth.endpoint.token_oauth:
    doc: auth_api_reference.md
    heading_keywords:
      - /auth/token
    must_contain:
      - authorization_code
      - client_id

  technical.auth.endpoint.logout:
    doc: auth_api_reference.md
    heading_keywords:
      - /auth/logout
    must_contain:
      - revoke
      - idempotent

  technical.auth.errors.codes:
    doc: auth_api_reference.md
    heading_keywords:
      - error codes
    must_contain:
      - invalid_credentials
      - token_expired

  # ============================================================
  # TECHNICAL — auth_configuration.md
  # Deployment config: env vars, TTLs, rotation, per-env settings.
  # ============================================================
  technical.auth.config.env_vars:
    doc: auth_configuration.md
    heading_keywords:
      - environment variables
    must_contain:
      - AUTH_JWT_SIGNING_KEY
      - AUTH_ACCESS_TOKEN_TTL

  technical.auth.config.ttl_policy:
    doc: auth_configuration.md
    heading_keywords:
      - token ttl policy
    must_contain:
      - 15 minutes
      - 30 days

  technical.auth.config.rotation:
    doc: auth_configuration.md
    heading_keywords:
      - key rotation
    must_contain:
      - quarterly
      - overlap window

  technical.auth.config.per_environment:
    doc: auth_configuration.md
    heading_keywords:
      - per-environment configuration
    must_contain:
      - staging
      - development

  # ============================================================
  # TECHNICAL — session_management.md
  # Session lifecycle: refresh, expiration, revocation.
  # ============================================================
  technical.session.refresh_flow:
    doc: session_management.md
    heading_keywords:
      - refresh flow
    must_contain:
      - rotated on every refresh
      - refresh_token_reused

  technical.session.expiration:
    doc: session_management.md
    heading_keywords:
      - session expiration
    must_contain:
      - inactivity timeout
      - refresh token expiration

  technical.session.revocation:
    doc: session_management.md
    heading_keywords:
      - token revocation
    must_contain:
      - denylist
      - JTI

  technical.session.model:
    doc: session_management.md
    heading_keywords:
      - session model
    must_contain:
      - concurrent sessions
      - session_id

  # ============================================================
  # HR / SUPPORT — unchanged from phase 1 baseline
  # ============================================================
  parental_leave.policy:
    doc: parental_leave.txt
    heading_keywords: []
    must_contain:
      - parental leave
      - eligibility

  support.ticket_1042:
    doc: ticket_1042.txt
    heading_keywords: []
    must_contain:
      - SUP-1042
      - authentication
